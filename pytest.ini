[tool:pytest]
markers =
    api: marks tests that require API calls (deselect with '-m "not api"')
    integration: marks integration tests that test multiple components together
    unit: marks unit tests that test individual components in isolation
    slow: marks tests that take a long time to run
    contracts: marks API contract tests that validate API behavior

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = 
    --strict-markers
    --disable-warnings
    -ra
