name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: poetry

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Poetry
        uses: ./.github/actions/setup-poetry
        with:
          python-version: ${{ steps.setup-python.outputs.python-version }}

      - name: Lint with ruff
        run: poetry run ruff check olostep/

  sync_client_tests:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: poetry

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Poetry
        uses: ./.github/actions/setup-poetry
        with:
          python-version: ${{ steps.setup-python.outputs.python-version }}

      - name: Run sync client integration tests
        env:
          OLOSTEP_API_KEY: ${{ secrets.OLOSTEP_API_KEY }}
        run: poetry run pytest -n 16 tests/integration/test_sync_client_api.py

  async_client_tests:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: poetry

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Poetry
        uses: ./.github/actions/setup-poetry
        with:
          python-version: ${{ steps.setup-python.outputs.python-version }}

      - name: Run async client integration tests
        env:
          OLOSTEP_API_KEY: ${{ secrets.OLOSTEP_API_KEY }}
        run: poetry run pytest -n 16 tests/integration/test_async_client_api.py
